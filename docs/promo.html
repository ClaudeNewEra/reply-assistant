<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>МозгПереписки AI — Promo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#000;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
#phone{
  width:390px;height:844px;
  background:#17212B;
  position:relative;overflow:hidden;
  border-radius:40px;
  box-shadow:0 0 100px rgba(108,99,255,0.25),0 0 0 1px rgba(255,255,255,0.06);
}

/* ── Header ── */
.tg-header{
  background:#1C2B3A;height:60px;
  display:flex;align-items:center;padding:0 16px;gap:12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  position:relative;z-index:5;
}
.avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#6C63FF,#A78BFA);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.hinfo h3{color:#fff;font-size:15px;font-weight:600;}
.hinfo p{color:#78A8C0;font-size:12px;}

/* ── Chat ── */
#chat{
  position:absolute;top:60px;bottom:60px;left:0;right:0;
  padding:12px 12px 8px;
  display:flex;flex-direction:column;gap:7px;
  overflow:hidden;
}

/* ── Bubbles ── */
.msg{
  max-width:82%;padding:9px 13px;
  border-radius:14px;font-size:14px;line-height:1.45;
  opacity:0;transform:translateY(16px);
  transition:opacity .35s ease,transform .35s ease;
}
.msg.vis{opacity:1;transform:translateY(0);}
.incoming{background:#182533;color:#dde6ee;border-bottom-left-radius:4px;align-self:flex-start;}
.outgoing{background:#2B5278;color:#fff;border-bottom-right-radius:4px;align-self:flex-end;}
.bot{background:#182533;color:#dde6ee;border-bottom-left-radius:4px;align-self:flex-start;max-width:92%;}

/* ── Typing ── */
.typing{
  display:flex;gap:5px;align-items:center;
  padding:10px 14px;background:#182533;
  border-radius:14px;border-bottom-left-radius:4px;
  align-self:flex-start;
  opacity:0;transition:opacity .3s;
}
.typing.vis{opacity:1;}
.typing span{
  width:6px;height:6px;background:#78A8C0;border-radius:50%;
  animation:bounce 1.1s infinite;
}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

/* ── Keyboard ── */
.keyboard{
  width:92%;align-self:flex-start;
  display:flex;flex-direction:column;gap:6px;
  opacity:0;transform:translateY(14px);
  transition:opacity .35s,transform .35s;
}
.keyboard.vis{opacity:1;transform:translateY(0);}
.kb-row{display:flex;gap:6px;}
.kb-btn{
  flex:1;background:#1e3a55;color:#b0cfe4;
  border:1px solid #2B5278;border-radius:9px;
  padding:9px 6px;font-size:12.5px;cursor:pointer;
  transition:background .2s,color .2s,border-color .2s;
  font-family:inherit;
}
.kb-btn.active{background:#6C63FF;color:#fff;border-color:#8B7FFF;}

/* ── Variants ── */
.variant{
  width:92%;align-self:flex-start;
  background:#162840;border:1px solid #1e3a55;
  border-radius:11px;padding:9px 13px;
  font-size:13.5px;color:#cce0f0;line-height:1.4;
  opacity:0;transform:translateX(-16px);
  transition:opacity .3s ease,transform .3s ease;
}
.variant.vis{opacity:1;transform:translateX(0);}
.vnum{color:#8B7FFF;font-weight:700;margin-right:5px;}

/* ── Input bar ── */
.input-bar{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:#1C2B3A;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  border-top:1px solid rgba(255,255,255,0.05);
  z-index:5;
}
.inp{
  flex:1;background:#17212B;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;height:38px;padding:0 14px;
  color:#666;font-size:14px;
  display:flex;align-items:center;
}
.mic-btn{color:#78A8C0;font-size:22px;}

/* ── Hook scene ── */
#hook{
  position:absolute;inset:0;z-index:15;
  background:#0b0b14;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px;
  opacity:0;transition:opacity .6s;
  pointer-events:none;
}
#hook.vis{opacity:1;pointer-events:all;}
.hook-emoji{font-size:64px;margin-bottom:20px;display:block;}
.hook-line{
  font-size:30px;font-weight:900;color:#fff;
  line-height:1.25;letter-spacing:-0.5px;
  opacity:0;transform:translateY(18px);
  transition:opacity .5s,transform .5s;
}
.hook-line.vis{opacity:1;transform:translateY(0);}
.hook-sub{
  font-size:17px;color:#5570a0;margin-top:14px;font-weight:500;
  opacity:0;transition:opacity .5s .3s;
}
.hook-sub.vis{opacity:1;}

/* ── CTA scene ── */
#cta{
  position:absolute;inset:0;z-index:15;
  background:radial-gradient(ellipse at 50% 30%,#1a1040,#0b0b14 70%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px;
  opacity:0;transition:opacity .7s;
  pointer-events:none;
}
#cta.vis{opacity:1;}
.cta-brain{font-size:60px;margin-bottom:18px;}
.cta-name{font-size:30px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:8px;}
.cta-tagline{font-size:16px;color:#7090b0;margin-bottom:32px;}
.cta-btn{
  background:#29B6F6;color:#000;font-weight:800;
  font-size:17px;padding:15px 32px;border-radius:16px;
  display:inline-block;margin-bottom:14px;font-family:inherit;
  animation:glow 2s infinite;
}
@keyframes glow{
  0%,100%{box-shadow:0 0 20px rgba(41,182,246,.4);}
  50%{box-shadow:0 0 50px rgba(41,182,246,.7);}
}
.cta-handle{color:#78A8C0;font-size:15px;margin-bottom:20px;}
.cta-free{
  font-size:13px;color:#3d5a7a;
  border:1px solid #1e3a55;border-radius:20px;padding:6px 18px;
}

/* ── Subtitle ── */
#sub{
  position:absolute;bottom:74px;left:16px;right:16px;
  background:rgba(0,0,0,.75);
  color:#fff;font-size:15px;font-weight:500;
  text-align:center;padding:10px 16px;
  border-radius:10px;z-index:25;
  min-height:44px;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;
  backdrop-filter:blur(8px);
}
#sub.vis{opacity:1;}

/* ── Play button ── */
#play{
  position:absolute;inset:0;z-index:30;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.5);cursor:pointer;
  backdrop-filter:blur(4px);
}
.play-ring{
  width:90px;height:90px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  background:rgba(108,99,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;
  animation:ring-pulse 2s infinite;
}
@keyframes ring-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(108,99,255,.5);}
  50%{box-shadow:0 0 0 18px rgba(108,99,255,0);}
}
.play-label{color:#ccc;margin-top:14px;font-size:14px;letter-spacing:.5px;}
</style>
</head>
<body>
<div id="phone">

  <div class="tg-header">
    <div class="avatar">🧠</div>
    <div class="hinfo">
      <h3>МозгПереписки AI</h3>
      <p>бот · онлайн</p>
    </div>
  </div>

  <div id="chat"></div>

  <div class="input-bar">
    <div class="inp">Сообщение...</div>
    <div class="mic-btn">🎤</div>
  </div>

  <!-- Overlays -->
  <div id="hook">
    <span class="hook-emoji">😶</span>
    <div class="hook-line" id="hl1">Получил сообщение...</div>
    <div class="hook-sub" id="hl2">и не знаешь что ответить?</div>
  </div>

  <div id="cta">
    <div class="cta-brain">🧠</div>
    <div class="cta-name">МозгПереписки AI</div>
    <div class="cta-tagline">Читает между строк.<br>Пишет за тебя.</div>
    <div class="cta-btn">Открыть в Telegram</div>
    <div class="cta-handle">@BrainDialog_bot</div>
    <div class="cta-free">✨ 3 анализа бесплатно</div>
  </div>

  <div id="sub"></div>

  <div id="play" onclick="start()">
    <div class="play-ring">▶</div>
    <div class="play-label">Нажми для просмотра</div>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const sub  = document.getElementById('sub');

// Audio clips from ElevenLabs
const AUDIO = {
  hook1:  'audio/hook1.mp3',
  hook2:  'audio/hook2.mp3',
  scene3: 'audio/scene3.mp3',
  scene4: 'audio/scene4.mp3',
  scene5: 'audio/scene5.mp3',
  scene6: 'audio/scene6.mp3',
  scene7: 'audio/scene7.mp3',
  scene8: 'audio/scene8.mp3',
  scene9: 'audio/scene9.mp3',
  cta:    'audio/cta.mp3',
};

const SUBTITLES = {
  hook1:  'Получил такое сообщение — и завис?!',
  hook2:  'Слушай, я нашёл кое-что реально крутое — сейчас покажу!',
  scene3: 'Смотри — тебе написали:',
  scene4: 'И ты не знаешь что ответить...',
  scene5: 'Просто скидываешь скрин в МозгПереписки AI — вот и всё!',
  scene6: 'Он мгновенно читает и спрашивает в каком стиле отвечать.',
  scene7: 'Флирт — жмёшь!',
  scene8: 'Бам — пять убийственных ответов прямо в чате!',
  scene9: 'Нажал — скопировал — вставил — отправил!',
  cta:    'Три анализа бесплатно! Ссылка в описании — переходи!',
};

function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

function speak(key){
  return new Promise(resolve => {
    sub.textContent = SUBTITLES[key] || '';
    sub.classList.add('vis');
    const audio = new Audio(AUDIO[key]);
    audio.onended = resolve;
    audio.onerror = ()=>{ console.warn('audio err', key); resolve(); };
    audio.play().catch(()=>resolve());
  });
}

function hideSub(){ sub.classList.remove('vis'); }

function addEl(el){
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  requestAnimationFrame(()=>{
    setTimeout(()=>el.classList.add('vis'), 40);
  });
}

function bubble(text, type){
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  el.textContent = text;
  return el;
}

function typing(){
  const el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  return el;
}

function keyboard(){
  const el = document.createElement('div');
  el.className = 'keyboard';
  el.innerHTML = `
    <div class="kb-row">
      <button class="kb-btn" id="flirt">💕 Флирт</button>
      <button class="kb-btn">❤️ Любовь</button>
    </div>
    <div class="kb-row">
      <button class="kb-btn">🤝 Дружба</button>
      <button class="kb-btn">😂 Юмор</button>
    </div>
    <div class="kb-row">
      <button class="kb-btn">💼 Деловой</button>
    </div>`;
  return el;
}

function variant(n, text){
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `<span class="vnum">${n}.</span>${text}`;
  return el;
}

async function start(){
  document.getElementById('play').remove();

  /* ── SCENE 1: Hook ── */
  const hook = document.getElementById('hook');
  hook.classList.add('vis');
  await delay(300);
  document.getElementById('hl1').classList.add('vis');
  await speak('hook1');
  await delay(150);
  document.getElementById('hl2').classList.add('vis');
  await speak('hook2');
  await delay(300);
  hook.style.transition = 'opacity .7s';
  hook.classList.remove('vis');
  await delay(700);
  hook.style.display = 'none';
  hideSub();

  /* ── SCENE 2: Incoming msg ── */
  await speak('scene3');
  addEl(bubble('Привет... ты обо мне думал? 👀', 'incoming'));
  await delay(400);

  await speak('scene4');
  await delay(350);

  /* ── SCENE 3: Send to bot ── */
  await speak('scene5');
  addEl(bubble('📸 переписка.jpg', 'outgoing'));
  await delay(400);

  /* ── SCENE 4: Bot typing + mode keyboard ── */
  const t1 = typing();
  addEl(t1);
  setTimeout(()=>t1.classList.add('vis'),30);

  await speak('scene6');
  await delay(200);
  t1.remove();

  addEl(bubble('⚡ Готово! Она флиртует — явно. Выбери стиль:', 'bot'));
  await delay(200);

  const kb = keyboard();
  addEl(kb);
  await delay(150);
  requestAnimationFrame(()=>setTimeout(()=>kb.classList.add('vis'),30));

  await speak('scene7');
  await delay(200);

  const flirtBtn = document.getElementById('flirt');
  if(flirtBtn) flirtBtn.classList.add('active');
  await delay(300);

  /* ── SCENE 5: Analysis ── */
  const t2 = typing();
  addEl(t2);
  setTimeout(()=>t2.classList.add('vis'),30);

  await speak('scene8');
  await delay(500);
  t2.remove();

  addEl(bubble('🔥 Вот 5 ответов — выбирай лучший:', 'bot'));
  await delay(200);

  const vars = [
    ['Думал. Прямо сейчас 😏', '#a78bfa'],
    ['Если честно — да 🙈', '#6C63FF'],
    ['А ты ждала этого? 🔥', '#a78bfa'],
    ['Что ты со мной делаешь... 💜', '#6C63FF'],
    ['Угадай 😈', '#a78bfa'],
  ];

  for(let i=0; i<vars.length; i++){
    await delay(220);
    const el = document.createElement('div');
    el.className = 'variant';
    el.innerHTML = `<span class="vnum" style="color:${vars[i][1]}">${i+1}.</span>${vars[i][0]}`;
    addEl(el);
  }

  await speak('scene9');
  await delay(300);

  /* ── SCENE 6: CTA ── */
  await speak('cta');
  await delay(200);
  hideSub();

  document.getElementById('cta').classList.add('vis');
}
</script>
</body>
</html>
