<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3DE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D8EE8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Chat bubble left (incoming) -->
  <rect x="80" y="140" width="220" height="100" rx="20" ry="20" fill="white" opacity="0.25" filter="url(#shadow)"/>
  <!-- Tail left -->
  <polygon points="80,200 60,230 100,220" fill="white" opacity="0.25"/>
  <!-- Dots in bubble -->
  <circle cx="130" cy="190" r="10" fill="white" opacity="0.7"/>
  <circle cx="165" cy="190" r="10" fill="white" opacity="0.7"/>
  <circle cx="200" cy="190" r="10" fill="white" opacity="0.7"/>

  <!-- Chat bubble right (AI reply) -->
  <rect x="210" y="270" width="220" height="100" rx="20" ry="20" fill="url(#bubble)" filter="url(#shadow)"/>
  <!-- Tail right -->
  <polygon points="430,310 452,340 412,330" fill="#e8e0ff"/>

  <!-- AI spark icon in right bubble -->
  <!-- Star/spark shape -->
  <g transform="translate(320, 320)">
    <polygon points="0,-28 7,-7 28,0 7,7 0,28 -7,7 -28,0 -7,-7" fill="#6C3DE8" opacity="0.9"/>
    <polygon points="0,-14 3.5,-3.5 14,0 3.5,3.5 0,14 -3.5,3.5 -14,0 -3.5,-3.5" fill="#3D8EE8"/>
  </g>
  <!-- Lines suggesting text -->
  <rect x="360" y="302" width="50" height="8" rx="4" fill="#6C3DE8" opacity="0.4"/>
  <rect x="360" y="318" width="35" height="8" rx="4" fill="#6C3DE8" opacity="0.3"/>

  <!-- Bottom text -->
  <text x="256" y="430" font-family="'SF Pro', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">ОтветAI</text>
</svg>
